# main 브랜치에 push 되면 flutter/ 안의 Flutter 앱을 빌드해 TestFlight로 자동 업로드한다.
#
# closeusvoice-flutter의 distribute-ios.yml과 동일한 패턴(self-hosted 맥미니 러너 +
# App Store Connect API 키로 altool 직접 업로드)을 참조했다. 이 저장소는 Flutter
# 프로젝트가 repo 루트가 아니라 flutter/ 서브폴더에 있어 모든 flutter/xcodebuild
# 명령에 working-directory를 지정한 점만 다르다.
#
# 이 워크플로 전용 self-hosted 러너: pricepick-macmini-runner
# (closeusvoice-flutter가 쓰는 macmini-runner와는 별개 인스턴스·별개 GitHub 저장소
# 등록이라 잡 이름·시크릿이 서로 겹치지 않는다.)
#
# ⚠️ 아래 시크릿은 전부 형님의 Apple 개발자 계정 로그인이 필요한 영역이다 —
# Xcode에서 팀 선택 후 최초 1회 Archive → Distribute App까지 수동으로 성공시켜
# 인증서/프로파일이 정상 발급되는 걸 먼저 확인하고 나서 아래 시크릿을 등록하는 걸 권장.
#
# ── 필요한 GitHub Secrets (Settings → Secrets and variables → Actions → New repository secret) ──
#
# IOS_DIST_CERT_P12_BASE64
#   Apple "Distribution" 인증서를 개인 키와 함께 .p12 로 내보낸 뒤 base64 인코딩한 값.
#   발급/내보내기:
#     1. Apple Developer → Certificates → Apple Distribution 인증서 생성(또는 기존 것 재사용)
#     2. 키체인 접근에서 해당 인증서 + 개인 키 선택 → 내보내기 → .p12 저장(비번 설정)
#     3. base64 -i dist.p12 | pbcopy → 이 Secret 값으로 붙여넣기
#
# IOS_DIST_CERT_PASSWORD
#   위 .p12 내보낼 때 설정한 비밀번호.
#
# IOS_APPSTORE_PROVISIONING_PROFILE_BASE64
#   App Store 배포용 프로비저닝 프로파일(.mobileprovision)을 base64 인코딩한 값.
#   발급:
#     1. Apple Developer → Profiles → "+" → Distribution → App Store Connect
#     2. App ID = com.pricepick.pricepickFlutter 선택, 위 Distribution 인증서 선택 → 생성 → 다운로드
#     3. base64 -i PricePick_AppStore.mobileprovision | pbcopy → 이 Secret 값으로 붙여넣기
#
# IOS_APPSTORE_PROVISIONING_PROFILE_NAME
#   위에서 만든 App Store 프로파일의 정확한 표시 이름(예: "PricePick AppStore").
#
# IOS_KEYCHAIN_PASSWORD
#   CI 러너에서 임시로 만드는 키체인 비밀번호. 아무 임의 문자열이면 된다.
#
# IOS_TEAM_ID
#   Apple Developer 팀 ID(10자리). Apple Developer → Membership → Team ID.
#   (현재 Xcode 프로젝트에 4C9FS43K72가 박혀 있는데, 형님 실제 팀 ID가 맞는지
#   Xcode Signing & Capabilities에서 먼저 확인/교체할 것 — 이전 보고 참고.)
#
# APPSTORE_ISSUER_ID / APPSTORE_API_KEY_ID / APPSTORE_API_PRIVATE_KEY
#   App Store Connect API 키 3종 — TestFlight 업로드 인증에 사용.
#   발급:
#     1. App Store Connect → 사용자 및 액세스 → 통합 → App Store Connect API
#     2. "새 API 키 생성" → 액세스 권한 "App Manager" → 생성
#     3. Issuer ID → APPSTORE_ISSUER_ID / Key ID → APPSTORE_API_KEY_ID
#     4. 다운로드한 .p8 내용 전체(BEGIN/END 포함) → APPSTORE_API_PRIVATE_KEY

name: Distribute PricePick iOS to TestFlight

on:
  push:
    branches: [main]
    paths:
      - "flutter/**"
      - ".github/workflows/distribute-ios.yml"
  workflow_dispatch:

jobs:
  distribute-ios:
    name: Build & Upload PricePick to TestFlight
    runs-on: [self-hosted, pricepick]

    defaults:
      run:
        working-directory: flutter

    env:
      BUNDLE_ID: com.pricepick.pricepickFlutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::Xcode not found on runner"; ls -d /Applications/Xcode*.app; exit 1
          fi
          echo "Selecting $XCODE_APP"
          export DEVELOPER_DIR="$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import code signing assets
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/pricepick_dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/pricepick_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/pricepick-app-signing.keychain-db"

          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Generate ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/PricePickExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-options-plist="$RUNNER_TEMP/PricePickExportOptions.plist"

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight (altool)
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"

          echo "== Validating IPA before upload =="
          xcrun altool --validate-app \
            -f "${{ steps.ipa.outputs.path }}" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --verbose || echo "::warning::validate-app reported issues (see above); continuing to upload"

          echo "== Uploading IPA to TestFlight =="
          xcrun altool --upload-app \
            -f "${{ steps.ipa.outputs.path }}" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --verbose
