<script>
'use strict';

// ── Firebase init ──────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCElUPJAitnMZxttVYjboV0j4s_qpErAgA",
  authDomain: "pricepick-demo.firebaseapp.com",
  projectId: "pricepick-demo",
  storageBucket: "pricepick-demo.firebasestorage.app",
  messagingSenderId: "505137396208",
  appId: "1:505137396208:web:cea9d208c7745854e14535"
};
const ADMIN_EMAIL = 'sgkim.mixit@gmail.com';
const ADMIN_UID   = 'PxiPDUKN1fa93YuWpZDkxiN30pj2';

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── Auth ───────────────────────────────────────────────────────
const provider = new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

document.getElementById('loginBtn').addEventListener('click', async () => {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  try {
    await auth.signInWithPopup(provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      try { await auth.signInWithRedirect(provider); } catch(e2) { showLoginErr(e2.message); }
    } else {
      showLoginErr(e.message);
    }
    btn.disabled = false;
    btn.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg> Google로 로그인`;
  }
});

// Handle redirect result on load
auth.getRedirectResult().then(result => {
  if (result && result.user) checkAdminAccess(result.user);
}).catch(e => showLoginErr(e.message));

auth.onAuthStateChanged(user => {
  if (user) checkAdminAccess(user);
  else showLogin();
});

function checkAdminAccess(user) {
  if (user.email !== ADMIN_EMAIL) {
    auth.signOut();
    showLoginErr('접근 권한 없음. 승인된 어드민 계정만 로그인 가능합니다.');
    return;

// ── Helpers ────────────────────────────────────────────────────
function uuid() {
  return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:r&0x3|0x8).toString(16)});
}
function fmtTs(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtKRW(n) { return (n||0).toLocaleString('ko-KR') + '원'; }
function fmtP(n) { return (n||0).toLocaleString('ko-KR') + 'P'; }
function now() { return firebase.firestore.FieldValue.serverTimestamp(); }
function ts(date) { return firebase.firestore.Timestamp.fromDate(new Date(date)); }
function daysFromNow(n) { const d = new Date(); d.setDate(d.getDate()+n); return firebase.firestore.Timestamp.fromDate(d); }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');

  t.className = `toast ${colors[type]||colors.info} text-white text-sm px-4 py-3 rounded-xl shadow-lg`;
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

// ── Greedy Algorithm ───────────────────────────────────────────
// 적립단위: bronze=5000, silver=50000, gold=100000
// 전등급 2% = 티켓 가치가 구매금액의 2% (bronze=100P, silver=1000P, gold=2000P)
// Greedy: 구매금액을 5000원 올림 후 gold→silver→bronze 단위로 채움
function greedyTickets(amount) {
  const units = Math.ceil(amount / 5000);
  let rem = units;
  const gold   = Math.floor(rem / 20); rem -= gold * 20;
  const silver = Math.floor(rem / 10); rem -= silver * 10;
  const bronze = rem;
  return { gold, silver, bronze };
}
function calcPoints(t) { return t.gold*2000 + t.silver*1000 + t.bronze*100; }
function gradeLabel(g) { return { gold:'금', silver:'은', bronze:'동' }[g] || g; }
function gradeClass(g) { return `badge badge-${g}`; }

window.doConfirm = async function(postbackId, userId, amount) {
  closeModal();
  const t = greedyTickets(amount);
  const pts = calcPoints(t);
  const grades = [
    { code:'gold',   qty: t.gold   },
    { code:'silver', qty: t.silver },
    { code:'bronze', qty: t.bronze },
  ].filter(g => g.qty > 0);

  const batch = db.batch();
  const expiresAt = daysFromNow(365);

  // user_tickets + ticket_transactions per grade
  grades.forEach(g => {
    const tktId = uuid();
    const ttxId = uuid();
    const ptsPer = { gold:2000, silver:1000, bronze:100 }[g.code];
    batch.set(db.collection('user_tickets').doc(tktId), {
      id: tktId, user_id: userId, ticket_type: 'grade', grade_code: g.code,
      qty: g.qty, status: 'active', source: 'purchase',
      acquired_at: now(), confirmed_at: now(), expires_at: expiresAt,
      created_at: now(), updated_at: now(), postback_id: postbackId
    });
    batch.set(db.collection('ticket_transactions').doc(ttxId), {
      id: ttxId, user_id: userId, ticket_type: 'grade', grade_code: g.code,
      type: 'EARN', qty: g.qty, source: 'purchase',
      ref_type: 'postbacks', ref_id: postbackId,
      expires_at: expiresAt, created_at: now()
    });
  });

  // user_points upsert
  const pointsRef = db.collection('user_points').doc(userId);
  const pointsDoc = await pointsRef.get();
  if (pointsDoc.exists) {
    batch.update(pointsRef, { balance: firebase.firestore.FieldValue.increment(pts), updated_at: now() });
  } else {
    batch.set(pointsRef, { user_id: userId, balance: pts, updated_at: now(), created_at: now() });
  }

  // point_transaction EARN
  const ptxId = uuid();
  batch.set(db.collection('point_transactions').doc(ptxId), {
    id: ptxId, user_id: userId, type: 'EARN', qty: pts,
    source: 'purchase', ref_type: 'postbacks', ref_id: postbackId,
    expires_at: expiresAt, created_at: now()
  });

  // postback status → confirmed
  batch.update(db.collection('postbacks').doc(postbackId), {
    status: 'confirmed', confirmed_at: now(), processed_at: now()
  });

  try {
    await batch.commit();
    showToast(`확정 완료 — ${fmtP(pts)} 적립`);
    loadPostbacks();
  } catch(e) {
    showToast('확정 오류: '+e.message, 'error');
  }
};

window.doRefund = async function(postbackId, userId) {
  closeModal();
  const tktsSnap = await db.collection('user_tickets')
    .where('postback_id','==',postbackId)
    .where('status','==','active').get();

  const batch = db.batch();
  let totalClawbackPts = 0;
  const ptsPerGrade = { gold:2000, silver:1000, bronze:100 };

  tktsSnap.docs.forEach(doc => {
    const tkt = doc.data();
    const ptsBack = (ptsPerGrade[tkt.grade_code]||0) * tkt.qty;
    totalClawbackPts += ptsBack;

    // Update ticket status
    batch.update(doc.ref, { status:'refunded', updated_at: now() });

    // CLAWBACK transaction
    const ttxId = uuid();
    batch.set(db.collection('ticket_transactions').doc(ttxId), {
      id: ttxId, user_id: userId, ticket_type: 'grade', grade_code: tkt.grade_code,
      type: 'CLAWBACK', qty: -tkt.qty, source: 'refund',
      ref_type: 'postbacks', ref_id: postbackId,
      expires_at: null, created_at: now()
    });
  });

  // Deduct points
  if (totalClawbackPts > 0) {
    batch.update(db.collection('user_points').doc(userId), {
      balance: firebase.firestore.FieldValue.increment(-totalClawbackPts), updated_at: now()
    });
    const ptxId = uuid();
    batch.set(db.collection('point_transactions').doc(ptxId), {
      id: ptxId, user_id: userId, type: 'CLAWBACK', qty: -totalClawbackPts,
      source: 'refund', ref_type: 'postbacks', ref_id: postbackId,
      expires_at: null, created_at: now()
    });
  }

  // postback → refunded
  batch.update(db.collection('postbacks').doc(postbackId), {
    status: 'refunded', processed_at: now()
  });

  try {
    await batch.commit();
    showToast(`환불 완료 — ${fmtP(totalClawbackPts)} 회수`);
    loadPostbacks();
  } catch(e) {
    showToast('환불 오류: '+e.message, 'error');
  }
};

async function loadUsers() {
  const el = document.getElementById('userListCard');
  const [usersSnap, pointsSnap] = await Promise.all([
    db.collection('users').get(),
    db.collection('user_points').get()
  ]);
  const pointsMap = {};
  pointsSnap.docs.forEach(d => { pointsMap[d.id] = d.data().balance; });

  const rows = usersSnap.docs.map(doc => {
    const d = doc.data();
    const pts = pointsMap[doc.id] ?? '—';
    const statusBadge = `<span class="badge badge-${d.status}">${d.status}</span>`;
    const linkBadge   = `<span class="badge badge-${d.link_status}">${d.link_status}</span>`;
    let actions = `<button onclick="openUserDetail('${doc.id}')" class="btn btn-ghost btn-sm">상세 보기</button>`;
    if (d.status === 'active') {
      actions += ` <button onclick="suspendUser('${doc.id}')" class="btn btn-sm border border-amber-300 text-amber-700 hover:bg-amber-50">정지</button>`;
    } else if (d.status === 'suspended') {
      actions += ` <button onclick="unsuspendUser('${doc.id}')" class="btn btn-sm border border-green-300 text-green-700 hover:bg-green-50">정지해제</button>`;
    }
    if (d.status !== 'withdrawn') {
      actions += ` <button onclick="withdrawUser('${doc.id}')" class="btn btn-sm border border-red-200 text-red-600 hover:bg-red-50">탈퇴</button>`;
    }
    return `<tr>
      <td class="font-mono text-xs text-slate-400">${doc.id}</td>
      <td class="font-medium">${d.nickname}</td>
      <td>${statusBadge}</td>
      <td>${linkBadge}</td>
      <td class="font-medium">${typeof pts === 'number' ? fmtP(pts) : pts}</td>
      <td class="text-xs text-slate-400">${fmtTs(d.joined_at)}</td>
      <td class="space-x-1">${actions}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="section-header"><h3 class="font-semibold text-slate-900">전체 유저</h3></div>
    <div class="overflow-x-auto"><table>
      <thead><tr><th>ID</th><th>닉네임</th><th>상태</th><th>연동</th><th>포인트</th><th>가입일</th><th>액션</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

window.openUserDetail = async function(userId) {
  openModal('유저 상세 — 불러오는 중...', '<div class="text-slate-400 text-sm">불러오는 중...</div>');
  const [userDoc, ticketsSnap, ttxSnap, ptxSnap] = await Promise.all([
    db.collection('users').doc(userId).get(),
    db.collection('user_tickets').where('user_id','==',userId).orderBy('created_at','desc').get(),
    db.collection('ticket_transactions').where('user_id','==',userId).orderBy('created_at','desc').limit(20).get(),
    db.collection('point_transactions').where('user_id','==',userId).orderBy('created_at','desc').limit(20).get()
  ]);
  const u = userDoc.data();
  const pointsDoc = await db.collection('user_points').doc(userId).get();
  const balance = pointsDoc.exists ? pointsDoc.data().balance : 0;

  const tktRows = ticketsSnap.docs.map(doc => {
    const d = doc.data();
    return `<tr>
      <td>${d.grade_code ? `<span class="badge badge-${d.grade_code}">${gradeLabel(d.grade_code)}</span>` : '<span class="badge">이벤트</span>'}</td>
      <td>${d.qty}장</td>
      <td><span class="badge badge-${d.status}">${d.status}</span></td>
      <td class="text-xs text-slate-400">${fmtTs(d.confirmed_at)}</td>
      <td class="text-xs text-slate-400">${fmtTs(d.expires_at)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="5" class="text-slate-400">티켓 없음</td></tr>';

  const ttxRows = ttxSnap.docs.map(doc => {
    const d = doc.data();
    return `<tr>
      <td><span class="badge badge-${d.type.toLowerCase()}">${d.type}</span></td>
      <td>${d.grade_code ? `<span class="badge badge-${d.grade_code} badge-sm">${gradeLabel(d.grade_code)}</span>` : '—'}</td>
      <td class="${d.qty>0?'text-green-700':'text-red-600'} font-medium">${d.qty>0?'+':''}${d.qty}</td>
      <td class="text-xs text-slate-400">${fmtTs(d.created_at)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="text-slate-400">원장 없음</td></tr>';

  const ptxRows = ptxSnap.docs.map(doc => {
    const d = doc.data();
    return `<tr>
      <td><span class="badge badge-${d.type.toLowerCase()}">${d.type}</span></td>
      <td class="${d.qty>0?'text-green-700':'text-red-600'} font-medium">${d.qty>0?'+':''}${fmtP(d.qty)}</td>
      <td class="text-xs text-slate-400">${d.source}</td>
      <td class="text-xs text-slate-400">${fmtTs(d.created_at)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="4" class="text-slate-400">원장 없음</td></tr>';

  document.getElementById('modalTitle').textContent = `${u.nickname} 상세`;
  document.getElementById('modalBody').innerHTML = `
    <div class="space-y-4 max-h-96 overflow-y-auto">
      <div class="flex gap-3 flex-wrap">
        <span class="badge badge-${u.status}">${u.status}</span>
        <span class="badge badge-${u.link_status}">${u.link_status}</span>
        <span class="text-sm text-slate-500">잔액: <strong>${fmtP(balance)}</strong></span>
        <span class="text-sm text-slate-500">가입: ${fmtTs(u.joined_at)}</span>
      </div>

      <div>
        <p class="text-xs font-semibold text-slate-500 uppercase mb-1">보유 티켓 <span class="state-tag">user_tickets</span></p>
        <table><thead><tr><th>등급</th><th>수량</th><th>상태</th><th>확정일</th><th>만료일</th></tr></thead>
        <tbody>${tktRows}</tbody></table>
      </div>

      <div>
        <p class="text-xs font-semibold text-slate-500 uppercase mb-1">티켓 원장 <span class="state-tag">ticket_transactions — 불변(삭제·수정 불가)</span></p>
        <table><thead><tr><th>유형</th><th>등급</th><th>수량</th><th>일시</th></tr></thead>
        <tbody>${ttxRows}</tbody></table>
      </div>

      <div>
        <p class="text-xs font-semibold text-slate-500 uppercase mb-1">포인트 원장 <span class="state-tag">point_transactions — 불변</span></p>
        <table><thead><tr><th>유형</th><th>포인트</th><th>출처</th><th>일시</th></tr></thead>
        <tbody>${ptxRows}</tbody></table>
      </div>
    </div>
  `;
};

window.suspendUser = async function(userId) {
  if (!confirm('이 유저를 정지하시겠습니까?')) return;
  await db.collection('users').doc(userId).update({ status:'suspended', updated_at: now() });
  showToast('유저 정지 완료 — users.status: suspended');
  loadUsers();
};
window.unsuspendUser = async function(userId) {
  await db.collection('users').doc(userId).update({ status:'active', updated_at: now() });
  showToast('정지 해제 — users.status: active');
  loadUsers();
};
window.withdrawUser = async function(userId) {
  if (!confirm('탈퇴 처리하시겠습니까? 되돌릴 수 없습니다.')) return;
  await db.collection('users').doc(userId).update({ status:'withdrawn', withdrawn_at: now(), updated_at: now() });
  showToast('탈퇴 처리 완료 — users.status: withdrawn');
  loadUsers();
};

window.saveNotice = async function() {

      </div>
    </div>
    <div class="text-xs text-slate-400 mb-3">저장 시: notifications 컬렉션에 문서 추가 (실제 FCM 전송은 서버 구현 필요)</div>
    <div class="flex gap-2 justify-end">
      <button onclick="closeModal()" class="btn btn-ghost">취소</button>
      <button onclick="sendNotif()" class="btn btn-primary">발송 기록</button>
    </div>
  `);
};
window.sendNotif = async function() {
  const userId = document.getElementById('ntf-user').value || null;
  const title  = document.getElementById('ntf-title').value.trim();
  const body   = document.getElementById('ntf-body').value.trim();
  if (!title) { showToast('제목 입력 필요', 'error'); return; }
  const id = uuid();
  await db.collection('notifications').doc(id).set({
    id, user_id: userId, title, body, status:'sent', created_at: now()
  });
  closeModal(); showToast('알림 기록 저장 완료'); loadNotifications();
};
</script>
</body>
</html>
