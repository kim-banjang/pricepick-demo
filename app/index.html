<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>PricePick — 픽구매 적립 데모</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --main: #845EEE;
  --main-dark: #6C4AB6;
  --sub-1: #9B78FF;
  --sub-2: #C6AFFF;
  --sub-3: #E2D9FF;
  --sub-4: #F1EEFF;
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --text1: #1A1130;
  --text2: #5A5370;
  --text3: #9B93B0;
  --text4: #C4BED0;
  --border: #EEEAF3;
  --border-strong: #E0D9ED;
  --red: #FF4452;
  --green: #22C55E;
  --r-sm: 8px; --r: 12px; --r-lg: 16px; --r-xl: 20px;
  --shadow-xs: 0 1px 2px rgba(26,17,48,0.04);
  --shadow-sm: 0 2px 8px rgba(26,17,48,0.05);
  --shadow: 0 4px 16px rgba(26,17,48,0.06);
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:#454F5B; font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; color:var(--text1); }

#root {
  max-width:390px; width:100%; height:100vh;
  margin:0 auto; background:var(--bg); position:relative; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
}

/* 상태바 */
.statusbar {
  height:44px; display:flex; justify-content:space-between; align-items:center;
  padding:0 24px; font-size:14px; font-weight:600; color:var(--text1);
  position:relative; z-index:10; flex-shrink:0;
}
.statusbar-icons { display:flex; gap:5px; }

/* 탭바 */
.tabbar {
  position:absolute; bottom:0; left:0; right:0; height:78px;
  background:white; border-top:1px solid var(--border);
  box-shadow:0 -4px 16px rgba(26,17,48,0.08);
  display:flex; padding-top:8px; padding-bottom:24px; z-index:20;
}
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:2px; }
.tab-ico { width:24px; height:24px; display:flex; align-items:center; justify-content:center; color:var(--text4); }
.tab-ico svg { width:22px; height:22px; }
.tab-lbl { font-size:10px; color:var(--text4); font-weight:500; }
.tab-ico .ico-line { display:block; }
.tab-ico .ico-solid { display:none; }
.tab-item.active .tab-ico { color:var(--text1); }
.tab-item.active .tab-lbl { color:var(--text1); font-weight:700; }
.tab-item.active .tab-ico .ico-line { display:none; }
.tab-item.active .tab-ico .ico-solid { display:block; }

/* 스크롤 */
.scroll { flex:1; overflow-y:auto; padding-bottom:90px; }
.scroll::-webkit-scrollbar { display:none; }

/* 버튼 */
.btn-primary { width:100%; height:54px; background:var(--main); color:white; border:none; border-radius:var(--r-lg); font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform 0.1s; }
.btn-primary:active { transform:scale(0.98); background:var(--main-dark); }
.btn-ghost { width:100%; height:48px; background:transparent; border:none; color:var(--text3); font-size:14px; font-weight:500; cursor:pointer; font-family:inherit; }

/* 홈 */
.app-screen { height:100%; display:flex; flex-direction:column; background:var(--bg); overflow:hidden; position:relative; }
.home-top { padding:10px 16px 14px; display:flex; align-items:center; justify-content:space-between; background:white; border-bottom:1px solid var(--border); flex-shrink:0; }
.brand-logo { display:flex; align-items:center; gap:8px; }
.brand-wordmark { font-family:'Poppins',sans-serif; font-size:18px; letter-spacing:0.5px; line-height:1; display:flex; align-items:center; }
.brand-wordmark .bw-light { font-weight:300; color:var(--text1); }
.brand-wordmark .bw-bold { font-weight:600; color:var(--main); }
.top-icons { display:flex; gap:4px; }
.top-icon-btn { width:38px; height:38px; background:transparent; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text1); }

/* 홈 티켓 카드 */
.home-ticket-card { margin:16px; border-radius:18px; background:#3D2A78; color:#fff; padding:18px 18px 14px; box-shadow:0 8px 24px rgba(61,42,120,0.22); }
.htc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.htc-label { font-size:12px; font-weight:700; opacity:0.85; }
.htc-status { font-size:10.5px; font-weight:700; background:rgba(255,255,255,0.18); padding:3px 9px; border-radius:99px; }
.htc-grades { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.htc-grade { background:rgba(255,255,255,0.13); border-radius:10px; padding:9px 6px; text-align:center; }
.htc-grade-name { font-size:9.5px; opacity:0.85; font-weight:600; margin-bottom:3px; }
.htc-grade-count { font-size:18px; font-weight:800; letter-spacing:-0.4px; line-height:1; }
.htc-grade-count .unit { font-size:9.5px; font-weight:600; opacity:0.8; margin-left:1px; }
.htc-pending-row { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:space-between; }
.htc-confirm-btn { background:rgba(255,255,255,0.22); color:#fff; border:none; border-radius:99px; padding:4px 12px; font-size:10.5px; font-weight:700; cursor:pointer; }

/* 홈 섹션 */
.home-sec { margin:0 16px 16px; }
.home-sec-title { font-size:14px; font-weight:700; color:var(--text1); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.home-sec-sub { font-size:11px; color:var(--text3); font-weight:500; }
.home-mall-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:border-color 0.15s; }
.home-mall-card:active { border-color:var(--sub-2); background:var(--sub-4); }
.home-mall-card.best { border-color:var(--sub-2); box-shadow:0 2px 10px rgba(132,94,238,0.08); }
.mall-logo-wrap { width:44px; height:44px; border-radius:10px; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
.mall-logo-wrap img { width:100%; height:100%; object-fit:contain; }
.mall-info { flex:1; min-width:0; }
.mall-name { font-size:14px; font-weight:700; color:var(--text1); }
.mall-rate { font-size:11.5px; color:var(--text3); margin-top:2px; }
.mall-go-btn { background:var(--sub-4); color:var(--main); padding:7px 12px; border-radius:99px; font-size:11.5px; font-weight:700; border:none; cursor:pointer; white-space:nowrap; }

/* 카카오 배너 */
.kakao-banner { margin:0 16px 14px; background:linear-gradient(135deg,#FFFBEC,#FFF3D2); border:1px solid #FFE69C; border-radius:14px; padding:13px 15px; display:flex; align-items:center; gap:12px; cursor:pointer; }
.kakao-banner-icon { width:40px; height:40px; background:#FEE500; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.kakao-banner-t { font-size:13px; font-weight:800; color:var(--text1); }
.kakao-banner-s { font-size:11px; color:var(--text2); margin-top:2px; line-height:1.45; }

/* 혜택 */
.reward-screen { height:100%; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; position:relative; }
.reward-top { padding:12px 16px 8px; display:flex; align-items:center; justify-content:space-between; background:white; border-bottom:1px solid var(--border); flex-shrink:0; }
.reward-top-title { font-size:17px; font-weight:700; color:var(--text1); letter-spacing:-0.4px; }
.reward-scroll { flex:1; overflow-y:auto; padding-bottom:90px; }
.reward-scroll::-webkit-scrollbar { display:none; }

/* 티켓 요약 카드 */
.ticket-summary-card { margin:14px 16px; background:linear-gradient(135deg,#6B47D9 0%,#845EEE 100%); border-radius:18px; padding:18px; color:#fff; }
.tsc-label { font-size:12px; font-weight:700; margin-bottom:10px; opacity:0.85; }
.tsc-grades { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.tsc-grade { background:rgba(255,255,255,0.13); border-radius:10px; padding:10px 6px; text-align:center; }
.tsc-grade-name { font-size:9.5px; opacity:0.8; font-weight:600; margin-bottom:3px; }
.tsc-grade-count { font-size:20px; font-weight:800; line-height:1; }
.tsc-grade-count .unit { font-size:10px; font-weight:600; opacity:0.8; margin-left:1px; }
.tsc-points { margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:space-between; }
.tsc-pts-label { font-size:11px; opacity:0.8; }
.tsc-pts-value { font-size:16px; font-weight:800; }

/* 기프티콘 */
.reward-section { background:white; margin:0 16px 14px; border-radius:var(--r); padding:14px 16px; border:1px solid var(--border); }
.reward-section-title { font-size:13px; font-weight:700; color:var(--text1); margin-bottom:12px; }
.gif-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-top:1px solid var(--border); }
.gif-row:first-of-type { border-top:none; padding-top:0; }
.gif-thumb { width:48px; height:48px; border-radius:10px; background:var(--bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:22px; }
.gif-info { flex:1; min-width:0; }
.gif-name { font-size:13px; font-weight:700; color:var(--text1); }
.gif-req { font-size:11px; color:var(--text3); margin-top:2px; }
.gif-btn { padding:7px 14px; border-radius:99px; font-size:12px; font-weight:700; border:none; cursor:pointer; font-family:inherit; flex-shrink:0; }
.gif-btn.available { background:var(--main); color:#fff; }
.gif-btn.unavailable { background:var(--bg); color:var(--text4); cursor:default; }

/* 등급 배지 */
.grade-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; }
.grade-badge.bronze { background:rgba(180,100,30,0.12); color:#9a5a1a; }
.grade-badge.silver { background:rgba(120,120,140,0.12); color:#555570; }
.grade-badge.gold { background:rgba(200,160,0,0.12); color:#8a6a00; }

/* 마이 */
.my-screen { height:100%; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
.my-scroll { flex:1; overflow-y:auto; padding-bottom:90px; }
.my-scroll::-webkit-scrollbar { display:none; }
.my-top { background:linear-gradient(135deg,#6B47D9 0%,#845EEE 100%); padding:16px 16px 24px; color:white; position:relative; flex-shrink:0; }
.my-top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.my-top-title { font-size:17px; font-weight:800; letter-spacing:-0.4px; }
.my-top-actions { display:flex; gap:4px; }
.my-top-btn { width:36px; height:36px; background:rgba(255,255,255,0.18); border:none; border-radius:10px; cursor:pointer; color:white; display:flex; align-items:center; justify-content:center; }
.my-profile { display:flex; align-items:center; gap:14px; }
.my-avatar { width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; border:2px solid rgba(255,255,255,0.3); }
.my-info { flex:1; min-width:0; }
.my-nickname { font-size:18px; font-weight:800; letter-spacing:-0.4px; margin-bottom:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.my-meta { font-size:11.5px; opacity:0.85; }
.my-section-title { padding:14px 16px 4px; font-size:11.5px; font-weight:700; color:var(--text3); letter-spacing:0.2px; }
.my-section { margin:0 16px 10px; background:white; border-radius:12px; overflow:hidden; border:1px solid var(--border); }
.my-row { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; border-top:1px solid var(--border); }
.my-row:first-child { border-top:none; }
.my-row-ico { width:32px; height:32px; background:var(--sub-4); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.my-row-body { flex:1; min-width:0; }
.my-row-name { font-size:14px; font-weight:600; color:var(--text1); }
.my-row-desc { font-size:11.5px; color:var(--text3); margin-top:2px; }
.my-row-right { color:var(--text3); font-size:13px; flex-shrink:0; }
.my-row-right.value { font-size:12px; color:var(--text2); font-weight:600; }
.kakao-pull-btn { background:#FEE500; color:#3A1D1D; border:none; padding:7px 11px; border-radius:8px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; flex-shrink:0; }

/* 온보딩 */
.login-screen { height:100%; background:linear-gradient(180deg,#FAFAFA 0%,#F1EEFF 100%); display:flex; flex-direction:column; position:relative; overflow:hidden; }
.login-content { flex:1; padding:24px 24px 0; display:flex; flex-direction:column; overflow-y:auto; }
.login-content::-webkit-scrollbar { display:none; }
.nick-input { width:100%; padding:14px 16px; border:1.5px solid var(--border-strong); border-radius:var(--r-lg); font-size:16px; font-weight:600; color:var(--text1); background:#fff; outline:none; font-family:inherit; transition:border-color 0.2s; }
.nick-input:focus { border-color:var(--main); }

/* 브릿지 */
.bridge-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:16px; background:#fff; }
.C-spin { width:96px; height:96px; position:relative; }
.C-spin::before { content:''; position:absolute; inset:0; border-radius:50%; border:3px solid var(--sub-4); }
.C-spin::after { content:''; position:absolute; inset:0; border-radius:50%; border:3px solid transparent; border-top-color:var(--main); animation:C-rot 1s linear infinite; }
@keyframes C-rot { to { transform:rotate(360deg); } }
.C-spin-logo { position:absolute; inset:18px; border-radius:14px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.C-spin-logo img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; }
.C-t { font-size:17px; font-weight:800; color:var(--text1); letter-spacing:-0.4px; text-align:center; }
.C-s { font-size:12px; color:var(--text2); text-align:center; line-height:1.55; }
.C-check-list { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:10px 14px; min-width:240px; }
.C-check-list .C-row { display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--text1); padding:4px 0; font-weight:600; }
.C-check-list .C-row .ico { color:var(--green); font-weight:800; }
.C-check-list .C-row.muted { color:var(--text3); font-weight:500; }

/* 서브헤더 */
.sub-header { display:flex; align-items:center; gap:10px; padding:10px 14px 12px; background:#fff; border-bottom:1px solid var(--border); flex-shrink:0; }
.back-btn { width:36px; height:36px; background:transparent; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text1); }
.sh-title { font-size:15px; font-weight:700; letter-spacing:-0.3px; color:var(--text1); }

/* 구매 시트 */
.purchase-sheet { padding:0 20px 20px; }
.ps-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; }
.ps-input { width:100%; padding:16px; border:1.5px solid var(--border-strong); border-radius:var(--r-lg); font-size:20px; font-weight:700; color:var(--text1); outline:none; font-family:inherit; text-align:right; transition:border-color 0.2s; }
.ps-input:focus { border-color:var(--main); }
.greedy-preview { background:var(--sub-4); border-radius:var(--r); padding:12px 14px; margin-top:12px; }
.gp-label { font-size:11px; color:var(--text3); font-weight:600; margin-bottom:7px; }
.gp-grades { display:flex; gap:8px; }
.gp-grade { background:#fff; border-radius:8px; padding:7px 10px; text-align:center; flex:1; }
.gp-grade-name { font-size:9.5px; font-weight:700; color:var(--text2); }
.gp-grade-count { font-size:16px; font-weight:800; color:var(--main); margin-top:2px; }
.gp-pts { font-size:12px; font-weight:700; color:var(--main); margin-top:8px; text-align:center; }
.state-note { background:#FFFBEB; border:1px solid #FDE68A; border-radius:8px; padding:8px 10px; margin-top:10px; font-size:10.5px; color:#92400E; line-height:1.6; font-family:ui-monospace,monospace; }

/* 오버레이 */
#overlay { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; justify-content:flex-end; pointer-events:none; }
#overlay.active { pointer-events:all; }
#overlayBg { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background 0.3s; }
#overlay.active #overlayBg { background:rgba(0,0,0,0.45); }
#overlaySheet { background:#fff; border-radius:24px 24px 0 0; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.16,1,0.3,1); max-height:85%; overflow-y:auto; position:relative; }
#overlaySheet::-webkit-scrollbar { display:none; }
#overlay.active #overlaySheet { transform:translateY(0); }
.sheet-handle { width:40px; height:4px; background:var(--border-strong); border-radius:2px; margin:12px auto 0; }
.sheet-hd { padding:12px 16px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sheet-title { font-weight:800; font-size:16px; letter-spacing:-0.3px; }
.sheet-close { background:none; border:none; cursor:pointer; color:var(--text3); width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
.sheet-body { padding:16px; }

/* 로딩 */
#loading { position:absolute; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
.loader-ico { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
.loader-text { margin-top:16px; font-size:13px; color:var(--text3); }

/* 토스트 */
#toast { position:absolute; bottom:95px; left:50%; transform:translateX(-50%); background:rgba(26,17,48,0.9); color:#fff; padding:9px 18px; border-radius:100px; font-size:12px; font-weight:600; z-index:200; white-space:nowrap; transition:opacity 0.3s; max-width:320px; text-align:center; pointer-events:none; }
#toast.hidden { opacity:0; }
.hidden { display:none !important; }
</style>
</head>
<body>
<div id="root">

<!-- 로딩 -->
<div id="loading">
  <div class="loader-ico">
    <svg width="52" height="52" viewBox="0 0 360 363" fill="none">
      <path d="M178.702 82.69C125.37 82.69 82.14 125.94 82.14 179.29V277.43H115.61V252.41C132.54 267.04 154.59 275.87 178.70 275.87C232.03 275.87 275.27 232.62 275.27 179.28C275.27 125.93 232.03 82.68 178.70 82.68V82.69ZM178.70 242.40C143.85 242.40 115.61 214.15 115.61 179.29C115.61 144.43 143.85 116.18 178.70 116.18C213.55 116.18 241.79 144.43 241.79 179.29C241.79 214.15 213.55 242.40 178.70 242.40Z" fill="#634C9E"/>
      <path d="M180 0C80.59 0 0 80.62 0 180.06V363H62.40V316.37C93.94 343.63 135.04 360.12 180 360.12C279.41 360.12 360 279.50 360 180.06C360 80.62 279.42 0 180 0ZM180 297.70C115.05 297.70 62.40 245.02 62.40 180.06C62.40 115.10 115.06 62.42 180 62.42C244.94 62.42 297.60 115.10 297.60 180.06C297.60 245.02 244.94 297.70 180 297.70Z" fill="#7A49DE"/>
    </svg>
  </div>
  <p class="loader-text">프라이스픽 로딩 중…</p>
</div>

<!-- 온보딩 -->
<div id="onboarding" class="hidden" style="height:100%;display:flex;flex-direction:column;">
  <div class="statusbar" style="background:transparent;"><span>9:41</span>
    <div class="statusbar-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
    </div>
  </div>
  <div class="login-content">
    <div style="display:flex;flex-direction:column;align-items:center;padding-top:6px;padding-bottom:24px;">

function greedy(amount) {
  const units = Math.ceil(amount/5000); let r=units;
  const gold=Math.floor(r/20); r-=gold*20;
  const silver=Math.floor(r/10); r-=silver*10;
  return { gold, silver, bronze:r, total:units };
}

function showOnboarding() {
  document.getElementById('loading').classList.add('hidden');
  const ob=document.getElementById('onboarding');
  ob.style.display='flex'; ob.classList.remove('hidden');
}
async function startOnboarding() {
  const nick=document.getElementById('nickInput').value.trim();
  if (!nick) { showToast('닉네임을 입력해주세요'); return; }
  const batch=db.batch();
  batch.set(db.collection('users').doc(S.uid),{
    user_id:S.uid,nickname:nick,link_status:'guest',status:'active',
    joined_at:nowTs(),withdrawn_at:null,created_at:nowTs(),updated_at:nowTs()
  });
  batch.set(db.collection('user_points').doc(S.uid),{
    user_id:S.uid,balance:0,updated_at:nowTs(),created_at:nowTs()
  });
  await batch.commit();
  S.userData={nickname:nick,link_status:'guest',status:'active'};
  showApp();
}

async function showApp() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('onboarding').classList.add('hidden');
  const sh=document.getElementById('appShell');
  sh.style.display='flex'; sh.classList.remove('hidden');
  await loadData(); renderTab('home');
}
async function loadData() {
  const [uDoc,pDoc,tkSnap,pbSnap,gifSnap]=await Promise.all([
    db.collection('users').doc(S.uid).get(),
    db.collection('user_points').doc(S.uid).get(),
    db.collection('user_tickets').where('user_id','==',S.uid).orderBy('created_at','desc').get(),
    db.collection('postbacks').where('user_id','==',S.uid).orderBy('created_at','desc').limit(10).get(),
    db.collection('gifticons').where('on_sale','==',true).get(),
  ]);
  if (uDoc.exists) S.userData=uDoc.data();
  S.points=pDoc.exists?(pDoc.data().balance||0):0;
  S.tickets=tkSnap.docs.map(d=>({id:d.id,...d.data()}));
  S.postbacks=pbSnap.docs.map(d=>({id:d.id,...d.data()}));
  S.gifticons=gifSnap.docs.map(d=>({id:d.id,...d.data()}));
  const today=new Date().toISOString().slice(0,10);
  const vSnap=await db.collection('daily_visits').where('user_id','==',S.uid).where('date','==',today).limit(1).get();
  S.attendedToday=!vSnap.empty;
}

function updateGP() {
  const amt=parseInt(document.getElementById('psAmt')?.value)||0;
  const t=greedy(amt); const pts=calcPts(t);
  const el=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  el('gp-gold',t.gold);el('gp-silver',t.silver);el('gp-bronze',t.bronze);
  el('gp-pts',pts>0?`확정 시 ${fmtP(pts)} 예상`:'');
}

async function completePurchase() {

  const batch=db.batch();
  batch.set(db.collection('postbacks').doc(pbId),{
    postback_id:pbId,user_id:S.uid,mall_code:_mallCode,
    order_id:`APP-${Math.floor(Math.random()*900000+100000)}`,
    raw_payload:{event:'purchase',amount:amt},purchase_amount:amt,
    commission_amount:Math.round(amt*0.02),status:'pending',

    purchased_at:nowTs(),confirmed_at:null,received_at:nowTs(),

// 포스트백 확정 (Greedy)
// ═══════════════════════════════════════════
async function confirmPostback(pbId) {
  const pbDoc=await db.collection('postbacks').doc(pbId).get();
  if (!pbDoc.exists||pbDoc.data().status!=='pending') { showToast('이미 처리됨'); return; }
  const amt=pbDoc.data().purchase_amount;
  const t=greedy(amt); const pts=calcPts(t);
  const grades=[{code:'gold',qty:t.gold},{code:'silver',qty:t.silver},{code:'bronze',qty:t.bronze}].filter(g=>g.qty>0);
  const batch=db.batch();
  S.tickets.filter(tk=>tk.postback_id===pbId&&tk.status==='pending').forEach(tk=>{
    batch.update(db.collection('user_tickets').doc(tk.id),{status:'confirmed_raw',updated_at:nowTs()});
  });
  grades.forEach(g=>{
    const tId=uuid(),txId=uuid();
    batch.set(db.collection('user_tickets').doc(tId),{
      id:tId,user_id:S.uid,ticket_type:'grade',grade_code:g.code,
      qty:g.qty,status:'active',source:'purchase',postback_id:pbId,
      acquired_at:nowTs(),confirmed_at:nowTs(),expires_at:addDays(365),
      created_at:nowTs(),updated_at:nowTs()
    });
    batch.set(db.collection('ticket_transactions').doc(txId),{
      id:txId,user_id:S.uid,ticket_type:'grade',grade_code:g.code,
      type:'EARN',qty:g.qty,status:'active',source:'purchase',
      ref_type:'postbacks',ref_id:pbId,expires_at:addDays(365),created_at:nowTs()
    });
  });
  batch.update(db.collection('user_points').doc(S.uid),{balance:firebase.firestore.FieldValue.increment(pts),updated_at:nowTs()});
  batch.set(db.collection('point_transactions').doc(uuid()),{
    user_id:S.uid,type:'EARN',qty:pts,source:'purchase',
    ref_type:'postbacks',ref_id:pbId,expires_at:addDays(365),created_at:nowTs()
  });
  batch.update(db.collection('postbacks').doc(pbId),{status:'confirmed',confirmed_at:nowTs(),processed_at:nowTs()});
  await batch.commit();
  await loadData();
  showToast(`티켓 확정 + ${fmtP(pts)} 적립`);
  renderTab(S.tab);
}

// ═══════════════════════════════════════════
// 기프티콘 교환
// ═══════════════════════════════════════════
function openGifExchange(gifId,gifName,reqGrade,reqQty,userQty) {
  openOverlay('기프티콘 교환',`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:36px;margin-bottom:12px">${reqGrade==='gold'?'G':reqGrade==='silver'?'S':'B'}</div>
      <div style="font-size:17px;font-weight:800;margin-bottom:6px">${gifName}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px"><span class="grade-badge ${reqGrade}">${GRADE_KO[reqGrade]} ${reqQty}장</span> 차감 · 보유 ${userQty}장</div>
      <div class="state-note" style="text-align:left;margin-bottom:16px">
        user_tickets[${reqGrade}].qty -= ${reqQty}<br>
        ticket_transactions: USE −${reqQty}<br>
        gifticon_exchanges: created
      </div>
      <button class="btn-primary" onclick="execGifExchange('${gifId}','${gifName}','${reqGrade}',${reqQty})">교환하기</button>
    </div>`);
}
async function execGifExchange(gifId,gifName,reqGrade,reqQty) {
  const gradeTkts=S.tickets.filter(t=>t.status==='active'&&t.grade_code===reqGrade);
  const total=gradeTkts.reduce((s,t)=>s+(t.qty||0),0);
  if (total<reqQty) { showToast('티켓 부족'); return; }
  const exchId=uuid(),ttxId=uuid();
  const batch=db.batch();
  let rem=reqQty;
  for (const tkt of gradeTkts) {
    if (rem<=0) break;
    const deduct=Math.min(tkt.qty,rem); rem-=deduct;
    batch.update(db.collection('user_tickets').doc(tkt.id),{qty:tkt.qty-deduct,status:tkt.qty-deduct===0?'expired':'active',updated_at:nowTs()});
  }
  batch.set(db.collection('ticket_transactions').doc(ttxId),{
    id:ttxId,user_id:S.uid,ticket_type:'grade',grade_code:reqGrade,
    type:'USE',qty:-reqQty,source:'gifticon_exchange',
    ref_type:'gifticon_exchanges',ref_id:exchId,expires_at:null,created_at:nowTs()
  });
  batch.set(db.collection('gifticon_exchanges').doc(exchId),{
    id:exchId,user_id:S.uid,gifticon_id:gifId,
    grade_code:reqGrade,qty_used:reqQty,status:'issued',
    issued_at:nowTs(),expires_at:addDays(30),created_at:nowTs()
  });
  await batch.commit();
  await loadData();
  closeOverlay(); showToast(`${gifName} 교환 완료`);
  renderTab(S.tab);
}

async function showTicketLedger() {

      <div><div style="font-size:12px;font-weight:700"><span class="grade-badge ${t.grade_code||''}">${t.type}</span></div><div style="font-size:10.5px;color:var(--text3);margin-top:3px">${GRADE_KO[t.grade_code]||''} · ${t.source||''}</div></div>
      <div style="font-size:15px;font-weight:800;color:${pos?'#16A34A':'var(--red)'}">${pos?'+':''}${t.qty}장</div>
    </div>`;
  }).join('')||'<div style="padding:24px;text-align:center;color:var(--text3)">내역 없음</div>';
  openOverlay('티켓 원장 (불변)',`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">삭제·수정 불가</div>${rows}`);
}

  }).join('')||'<div style="padding:24px;text-align:center;color:var(--text3)">내역 없음</div>';
  openOverlay('포인트 원장 (불변)',`<div style="font-size:10px;color:var(--text3);margin-bottom:8px">삭제·수정 불가</div>${rows}`);
